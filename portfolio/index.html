<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
  }

  .app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 760px;
    margin: 0 auto;
    background: #ffffff;
    box-shadow: 0 0 60px rgba(0,0,0,0.1);
  }

  /* ── Header ── */
  .header {
    padding: 18px 24px 0;
    background: white;
    flex-shrink: 0;
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 4px;
  }

  .header-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .available-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 600;
    color: #16a34a;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    padding: 3px 10px;
    border-radius: 100px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 3px;
  }

  .available-dot {
    width: 6px;
    height: 6px;
    background: #16a34a;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .header-title {
    font-size: 11px;
    font-weight: 500;
    color: #888;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .header-links {
    display: flex;
    gap: 12px;
  }

  .header-links a {
    font-size: 11px;
    color: hsl(187, 74%, 32%);
    text-decoration: none;
    font-weight: 500;
  }

  .header-links a:hover { text-decoration: underline; }

  .header-gradient {
    height: 2px;
    background: linear-gradient(to right, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    border-radius: 1px;
  }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .message {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .bubble {
    max-width: 76%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 13.5px;
    line-height: 1.65;
  }

  .message.suril .bubble {
    background: #f7f7f8;
    border: 1px solid #ebebeb;
    border-bottom-left-radius: 4px;
    color: #2a2a2a;
  }

  .message.user .bubble {
    background: linear-gradient(135deg, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    color: white;
    border-bottom-right-radius: 4px;
  }

  .bubble a {
    color: hsl(187, 74%, 55%);
    text-decoration: none;
  }
  .bubble a:hover { text-decoration: underline; }

  /* ── Typing indicator ── */
  .typing-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: fadeUp 0.2s ease;
  }

  .typing-bubble {
    background: #f7f7f8;
    border: 1px solid #ebebeb;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 13px 16px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: #bbb;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.18s; }
  .typing-dot:nth-child(3) { animation-delay: 0.36s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Suggestions ── */
  .suggestions {
    padding: 8px 20px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    flex-shrink: 0;
  }

  .suggestion {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: hsl(187, 74%, 28%);
    background: hsl(187, 40%, 95%);
    border: 1px solid hsl(187, 40%, 86%);
    padding: 5px 13px;
    border-radius: 100px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .suggestion:hover {
    background: hsl(187, 74%, 32%);
    color: white;
    border-color: hsl(187, 74%, 32%);
  }

  /* ── Input ── */
  .input-area {
    padding: 10px 20px 20px;
    border-top: 1px solid #f0f0f0;
    display: flex;
    gap: 10px;
    background: white;
    flex-shrink: 0;
  }

  .input-field {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    padding: 10px 18px;
    border: 1.5px solid #e2e2e2;
    border-radius: 100px;
    outline: none;
    color: #1a1a2e;
    background: #fafafa;
    transition: border-color 0.15s, background 0.15s;
  }

  .input-field:focus {
    border-color: hsl(187, 74%, 40%);
    background: white;
  }

  .input-field::placeholder { color: #bbb; }

  .send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }

  .send-btn:hover { opacity: 0.88; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }

  /* ── Scrollbar ── */
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 2px; }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .bubble { max-width: 88%; font-size: 13px; }
    .header-name { font-size: 19px; }
    .app { box-shadow: none; }
  }
</style>

<script>

const conversationHistory = [];

async function fetchResponse(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });

  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: conversationHistory }),
  });

  if (!res.ok) throw new Error('API error');

  const data = await res.json();
  conversationHistory.push({ role: 'assistant', content: data.content });
  return data.content;
}

// ── Legacy keyword fallback (used only if API is unavailable) ──

const FALLBACK = `Good question -- let me point you in the right direction. You can ask me about:\n\n• My experience at SolarWinds or SentryOne\n• The AI agent architecture I shipped\n• What I'm looking for in my next role\n• Salary expectations or availability\n• Technical skills or education\n• My background in client services\n\nWhat would be most helpful?`;

function getResponse(input) {
  const text = input.toLowerCase();
  for (const intent of INTENTS) {
    for (const key of intent.keys) {
      if (text.includes(key)) return intent.r;
    }
  }
  return FALLBACK;
}

function addMessage(html, role) {
  const messages = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;

  if (role === 'suril') {
    wrap.innerHTML = `<div class="avatar">SJ</div><div class="bubble">${html.replace(/\n/g, '<br>')}</div>`;
  } else {
    wrap.innerHTML = `<div class="bubble">${html}</div>`;
  }

  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  wrap.id = 'typing';
  wrap.innerHTML = `
    <div class="avatar">SJ</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>`;
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function hideSuggestions() {
  const s = document.getElementById('suggestions');
  if (!s) return;
  s.style.transition = 'opacity 0.25s';
  s.style.opacity = '0';
  setTimeout(() => s.remove(), 250);
}

async function handleSend() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  hideSuggestions();
  addMessage(text, 'user');
  input.value = '';
  input.disabled = true;
  showTyping();
  try {
    const reply = await fetchResponse(text);
    removeTyping();
    addMessage(reply, 'suril');
  } catch {
    removeTyping();
    addMessage(getResponse(text), 'suril');
  } finally {
    input.disabled = false;
    input.focus();
  }
}

async function sendSuggestion(btn) {
  const text = btn.textContent;
  hideSuggestions();
  addMessage(text, 'user');
  document.getElementById('input').disabled = true;
  showTyping();
  try {
    const reply = await fetchResponse(text);
    removeTyping();
    addMessage(reply, 'suril');
  } catch {
    removeTyping();
    addMessage(getResponse(text), 'suril');
  } finally {
    document.getElementById('input').disabled = false;
  }
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
});

setTimeout(() => {
  addMessage(`Hey! I'm Suril Jasani. Ask me anything about my background, experience, or what I'm looking for -- I'm happy to answer.\n\nNot sure where to start? Try one of the suggested questions below.`, 'suril');
}, 350);
